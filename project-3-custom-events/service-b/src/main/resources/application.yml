spring:
  application:
    name: service-b
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  cloud:
    bus:
      enabled: true

server:
  port: 8092

management:
  endpoints:
    web:
      exposure:
        include: health,info,busrefresh
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    "[com.springbus]": DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
